name: Deploy App
on:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps
      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          HELIUS_RPC_URL: https://api.devnet.solana.com
          NEXT_PUBLIC_ALLOCATOR_PROGRAM_ID: 2QtJ5kmxLuW2jYCFpJMtzZ7PCnKdoMwkeueYoDUi5z5P
          NEXT_PUBLIC_USDC_MINT: BiTXT15XyfSakk5Yz8L8QrzHPWbK8NjoZeEMFrDvKdKh
          NEXT_PUBLIC_KEEPER_API_URL: http://localhost:3001

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/nanuqfi/nanuqfi-app
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            HELIUS_RPC_URL=${{ secrets.HELIUS_RPC_URL }}
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          env:
            MINT_AUTHORITY_KEYPAIR: /data/secrets/solana-devnet.json
          script: |
            cd ${{ secrets.VPS_APP_PATH }}
            docker compose pull
            docker compose up -d
            docker image prune -f
