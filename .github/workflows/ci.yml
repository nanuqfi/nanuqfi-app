name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      HELIUS_RPC_URL: https://api.devnet.solana.com
      NEXT_PUBLIC_ALLOCATOR_PROGRAM_ID: 2QtJ5kmxLuW2jYCFpJMtzZ7PCnKdoMwkeueYoDUi5z5P
      NEXT_PUBLIC_USDC_MINT: BiTXT15XyfSakk5Yz8L8QrzHPWbK8NjoZeEMFrDvKdKh
      NEXT_PUBLIC_KEEPER_API_URL: https://keeper.nanuqfi.com
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm lint
      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps
      - name: Run E2E tests
        run: pnpm test:e2e
