name: nanuqfi-app

services:
  app:
    image: ghcr.io/nanuqfi/nanuqfi-app:latest
    container_name: nanuqfi-app
    restart: unless-stopped
    ports:
      - "9001:3000"
    environment:
      - HELIUS_RPC_URL=${HELIUS_RPC_URL:-https://api.devnet.solana.com}
      - NEXT_PUBLIC_ALLOCATOR_PROGRAM_ID=${NEXT_PUBLIC_ALLOCATOR_PROGRAM_ID:-2QtJ5kmxLuW2jYCFpJMtzZ7PCnKdoMwkeueYoDUi5z5P}
      - NEXT_PUBLIC_USDC_MINT=${NEXT_PUBLIC_USDC_MINT:-BiTXT15XyfSakk5Yz8L8QrzHPWbK8NjoZeEMFrDvKdKh}
      - NEXT_PUBLIC_KEEPER_API_URL=${NEXT_PUBLIC_KEEPER_API_URL:-https://keeper.nanuqfi.xyz}
      - MINT_AUTHORITY_KEYPAIR=/data/secrets/solana-devnet.json
    volumes:
      - /home/nanuqfi/secrets/solana-devnet.json:/data/secrets/solana-devnet.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 60s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
